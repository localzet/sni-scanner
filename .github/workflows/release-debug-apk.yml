name: Build debug APK for release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build and upload debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare release asset
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          safe_tag="$(echo "$tag" | tr '/ ' '--')"
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk "release-assets/sni-scanner-${safe_tag}-debug.apk"

      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sni-scanner-debug-apk
          path: release-assets/*.apk
          if-no-files-found: error
